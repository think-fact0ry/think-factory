<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>모니터링 설문 — 생각공작소</title>
<meta name="robots" content="noindex">
<!-- 모니터링 설문 단축 경로. think-factory.kr/m → 14_모니터링설문 GAS 웹앱(exec)으로 즉시 이동.
     배포 URL은 고정(재배포해도 안 바뀜)이라 이 리다이렉트만 유지하면 됨.
     이동 대상이 바뀌면 아래 EXEC 한 줄만 교체. -->
<script>
  var EXEC = "https://script.google.com/macros/s/AKfycbx6zIcFuPUPRBr4VmW6kT98HzQv0UgtEUBwVLu8V4P9xCphV9ZP9yG_ZKsRfglLA4Kx/exec";
  // 쿼리스트링이 붙어 오면 그대로 전달(향후 확장 대비)
  location.replace(EXEC + (location.search || ""));
</script>
<!-- JS 비활성 환경 폴백 -->
<meta http-equiv="refresh" content="0;url=https://script.google.com/macros/s/AKfycbx6zIcFuPUPRBr4VmW6kT98HzQv0UgtEUBwVLu8V4P9xCphV9ZP9yG_ZKsRfglLA4Kx/exec">
<style>
  html,body{height:100%;margin:0}
  body{font-family:"Pretendard",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
       background:#f7f5f1;color:#3a8a5f;display:flex;align-items:center;justify-content:center;
       flex-direction:column;gap:14px;text-align:center;padding:24px}
  .dot{width:34px;height:34px;border:3px solid #cfe6d8;border-top-color:#3a8a5f;border-radius:50%;
       animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#3a8a5f}
  p{color:#7a8a80;font-size:14px;margin:0}
</style>
</head>
<body>
  <div class="dot"></div>
  <p>설문으로 이동 중이에요…</p>
  <p style="font-size:13px">자동으로 안 넘어가면 <a href="https://script.google.com/macros/s/AKfycbx6zIcFuPUPRBr4VmW6kT98HzQv0UgtEUBwVLu8V4P9xCphV9ZP9yG_ZKsRfglLA4Kx/exec">여기를 눌러주세요</a>.</p>
</body>
</html>

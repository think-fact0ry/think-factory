<section class="sec" style="padding-top:12px;">
  <div class="inner">
    <div class="acts" id="actList">
      <p style="color:var(--g500);">활동 이야기를 준비하고 있습니다. 그동안은 <a href="https://blog.naver.com/think5007" target="_blank" rel="noopener" style="color:var(--green); font-weight:600;">네이버 블로그</a>에서 보실 수 있어요.</p>
    </div>
  </div>
</section>

<script>
// activities/index.json은 블로그 동기화 파이프라인이 생성·갱신한다 (블로그=원본, 여기는 거울)
fetch('activities/index.json')
  .then(r => { if (!r.ok) throw 0; return r.json(); })
  .then(posts => {
    if (!posts.length) return;
    const list = document.getElementById('actList');
    list.innerHTML = posts.map(p => `
      <a class="act" href="activities/${p.slug}.html">
        <div class="thumb">${p.thumb ? `<img src="${p.thumb}" alt="${p.title}" loading="lazy">` : ''}</div>
        <div class="body"><div class="date">${p.date}</div><h3>${p.title}</h3></div>
      </a>`).join('');
  })
  .catch(() => {}); // index.json 없으면 준비 중 문구 유지
</script>

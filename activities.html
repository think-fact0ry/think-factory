<script>
// activities/posts.json은 tools/sync-blog.mjs가 생성·갱신 (블로그=원본, 여기는 거울)
fetch('activities/posts.json')
  .then(function (r) { if (!r.ok) throw 0; return r.json(); })
  .then(function (data) {
    var posts = (data && data.posts) || [];
    posts = posts.filter(function (p) { return (p.date || '') >= '2025.04.02' && /오감쑥쑥/.test(p.tag || ''); });  // 활동글만(오감 태그) — 안내·가이드 글 제외(피드='아이들의 오늘'=활동). + 너무 오래된 글 숨김
    if (!posts.length) return;
    var list = document.getElementById('actList');
    var pager = document.getElementById('pager');
    var PER = 9, pages = Math.ceil(posts.length / PER);   // 9개/페이지(3행×3열, 유성 2026-06-29)
    function card(p) {
      var a = document.createElement('a');
      a.className = 'act';
      if (p.page === false) { a.href = p.url; a.target = '_blank'; a.rel = 'noopener'; } // 본문 추출 실패분만 네이버 폴백
      else a.href = 'activities/posts/' + p.logNo + '.html';                            // 내부 글 페이지(블로그 미러, 구글 색인)
      var th = document.createElement('div'); th.className = 'thumb';
      if (p.thumb) { var img = document.createElement('img'); img.src = 'activities/' + p.thumb; img.alt = p.title; img.loading = 'lazy'; th.appendChild(img); }
      var body = document.createElement('div'); body.className = 'body';
      var date = document.createElement('div'); date.className = 'date'; date.textContent = p.date + (p.tag ? ' · ' + p.tag : '');
      var h3 = document.createElement('h3'); h3.textContent = p.feedTitle || (p.t2 ? p.t1 + '\n' + p.t2 : p.title);   // AI 정제 제목 우선, 없으면 원제목 폴백
      body.appendChild(date); body.appendChild(h3);
      a.appendChild(th); a.appendChild(body);
      return a;
    }
    function renderPage(n) {
      list.innerHTML = '';
      posts.slice((n - 1) * PER, n * PER).forEach(function (p) { list.appendChild(card(p)); });
      pager.innerHTML = '';
      if (pages > 1) for (var i = 1; i <= pages; i++) (function (i) {
        var b = document.createElement('button'); b.textContent = i;
        if (i === n) b.className = 'on';   // 현재 페이지 = 초록 볼드
        b.onclick = function () { renderPage(i); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        pager.appendChild(b);
      })(i);
    }
    renderPage(1);
  })
  .catch(function () {}); // posts.json 없으면 준비 중 문구 유지
</script>

<script>
// ── 모바일 드로어 메뉴 ──
(function () {
  var d = document.getElementById('drawer'), b = document.getElementById('hbBtn');
  if (!d || !b) return;
  function reset() { d.classList.remove('open'); document.body.style.overflow = ''; }
  b.addEventListener('click', function () {
    d.classList.add('open'); document.body.style.overflow = 'hidden';
    history.pushState({ drawer: 1 }, '');
  });
  d.addEventListener('click', function (e) {
    if (e.target.closest('a')) { reset(); return; }
    if (e.target.hasAttribute('data-close')) { reset(); if (history.state && history.state.drawer) history.back(); }
  });
  window.addEventListener('popstate', function () { if (d.classList.contains('open')) reset(); });
  window.addEventListener('resize', function () { if (window.innerWidth > 760 && d.classList.contains('open')) reset(); });
})();

(function () {
  var b = document.getElementById('toTop');
  if (!b) return;
  b.addEventListener('click', function (e) { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
  function toggle() { b.classList.toggle('show', window.pageYOffset > 300); }
  window.addEventListener('scroll', toggle, { passive: true });
  toggle();
})();
</script>

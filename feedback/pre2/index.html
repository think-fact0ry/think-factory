<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>초기 모니터링 · 형제 마감 비교</title>
<!-- 16_조기피드백 페이지1 최종안(이름 위·생년월일 아래·밑줄·단일 무구분) 베이스. 형제 2명일 때 마감(번호 스타일·배경) 비교.
     정본=prototype/, 서빙=think-factory/feedback/pre2/. 채택 시 Index 병합 후 삭제(생명주기). -->
<style>
  :root{
    --g50:#f9fafb; --g100:#f2f4f6; --g200:#e5e8eb; --g300:#d1d6db; --g400:#b0b8c1; --g500:#8b95a1; --g700:#4e5968; --g900:#191f28;
    --green100:#e0fcea; --green200:#c4f6d6; --green600:#3a8a5f; --green700:#166841;
    --green:var(--green600); --green-dark:var(--green700); --green-bg:var(--green100);
    --r-md:clamp(10px,2.6vw,14px); --r-lg:clamp(13px,3.2vw,20px);
    --fs-h1:clamp(23px,3.4vw,30px); --fs-caption:12px;
    --beige:#f7f5f1;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{scrollbar-gutter:stable;}
  html,body{margin:0; background:var(--beige);}
  body{font-family:Pretendard,-apple-system,system-ui,'Apple SD Gothic Neo',sans-serif; color:var(--g900); line-height:1.5; word-break:keep-all; -webkit-text-size-adjust:100%;}
  .page{max-width:460px; margin:0 auto; padding:22px 18px 60px;}
  .page-intro{margin:0 0 20px; padding:0 2px;}
  .page-intro h1{font-size:19px; font-weight:700; margin:0 0 5px;}
  .page-intro p{font-size:13.5px; color:var(--g500); margin:0; line-height:1.6;}

  /* 상단 탭(버튼으로 전환) */
  .tabs{display:flex; flex-wrap:wrap; gap:7px; margin:0 0 16px;}
  .tab{font:inherit; font-size:13px; font-weight:700; padding:7px 13px; border-radius:999px; border:1px solid var(--g200); background:#fff; color:var(--g700); cursor:pointer;}
  .tab.on{border-color:var(--green200); background:var(--green-bg); color:var(--green);}
  .variant{margin:0;}
  .vlabel{font-size:14px; font-weight:700; color:var(--g900); margin:0 0 4px; padding:0 2px;}
  .vnote{font-size:var(--fs-caption); color:var(--g500); margin:0 0 12px; padding:0 2px;}

  .intro-card{background:#fff; border-radius:var(--r-lg); padding:22px 18px; box-shadow:0 2px 12px rgba(0,0,0,.05);}
  .brand-chip{display:inline-block; width:fit-content; font-size:var(--fs-caption); font-weight:700; color:var(--green); background:var(--green-bg); padding:5px 12px; border-radius:99px; margin-bottom:13px;}
  .head{font-size:var(--fs-h1); font-weight:700; letter-spacing:-.3px; margin:0 0 8px; line-height:1.4;}
  .head .em{font-weight:400;}
  .lead{font-size:14.5px; color:var(--g500); margin:0 0 18px; line-height:1.6;}

  /* 밑줄형 입력(§4.1-2) */
  .tfield{margin-bottom:15px;} .tfield:last-child{margin-bottom:4px;}
  .tfield label{display:block; font-size:12.5px; font-weight:600; color:var(--g500); margin:0 0 5px;}
  .tin-wrap{position:relative; border-bottom:2px solid var(--g200);}
  .tin-wrap input{width:100%; border:none; background:none; outline:none; font:inherit; font-size:18px; font-weight:600; color:var(--g900); padding:2px 34px 3px 0; caret-color:var(--green); letter-spacing:-.2px;}
  .tin-wrap input::placeholder{color:var(--g300); font-weight:500;}
  .tin-wrap .clr{position:absolute; right:0; top:6px; width:15px; height:15px; border-radius:50%; background:var(--g300); border:none; display:flex; align-items:center; justify-content:center; padding:0;}
  .tin-wrap .clr svg{width:7px; height:7px; color:#fff; display:block;}

  /* 아동 헤더 = 번호 + − */
  .khead{display:flex; align-items:center; justify-content:space-between; margin:0 0 10px;}
  .kn-c700{width:24px;height:24px;border-radius:50%;background:var(--green700);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .kn-c600{width:24px;height:24px;border-radius:50%;background:var(--green600);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .kn-text{color:var(--green);font-weight:800;font-size:15px;}
  .kn-tag{display:flex;align-items:center;gap:8px;}
  .kn-tag .kt{font-size:var(--fs-caption);font-weight:700;color:var(--green);}
  .kdel{border:none;background:transparent;color:var(--g400);cursor:pointer;padding:5px;display:inline-flex;align-items:center;}
  .kdel svg{width:18px;height:18px;}

  /* 형제 간격·배경 */
  .kid + .kid{margin-top:18px;}
  .b-shadow .kid{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.07);border-radius:var(--r-md);padding:14px 15px 4px;}
  .b-g50 .kid{background:var(--g50);border-radius:var(--r-md);padding:14px 15px 4px;}
  .b-accent .kid{border-left:3px solid var(--green200);padding-left:13px;}

  /* 좌측 인덱스(번호 좌·입력 우, ex40) */
  .lay-left .kid{position:relative;display:flex;gap:12px;}
  .lay-left .khead{display:block;margin:0;}
  .lay-left .kn-c700{margin-top:2px;}
  .lay-left .ki-body{flex:1;min-width:0;}
  .lay-left .kdel{position:absolute;top:-4px;right:-4px;}

  .sib-link{display:block;width:100%;text-align:center;border:none;background:none;color:var(--green);font:inherit;font-size:14px;font-weight:600;padding:13px 4px 2px;margin-top:8px;}
</style>
</head>
<body>
<div class="page">
  <div class="page-intro">
    <h1>형제일 때 마감 비교</h1>
    <p>확정안 위에서 형제 2명일 때 번호·배경만 다르게. 위 버튼으로 전환해 보세요.</p>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
</div>

<script>
  var KIDS=[{name:'김서준',birth:'2021. 03. 15'},{name:'김서아',birth:'2023. 07. 22'}];
  var CLR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  var MINUS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="12" x2="18" y2="12"/></svg>';
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

  // num: c700|c600|text|tag / bg: ''|shadow|g50|accent / layout: stack|left
  var VARIANTS=[
    {label:'V1 · 번호 원(green700) · 배경 없음',  note:'현 Index 확정안',            num:'c700', bg:''},
    {label:'V2 · 번호 원 + 그림자 박스',          note:'그림자로 아이 묶음',         num:'c700', bg:'shadow'},
    {label:'V3 · 번호 원 + 회색면(g50)',          note:'면으로 아이 묶음',           num:'c700', bg:'g50'},
    {label:'V4 · 번호 원 + 왼쪽 악센트 바',       note:'세로선 강조',                num:'c700', bg:'accent'},
    {label:'V5 · 번호 원 + "첫째 아이" 텍스트',   note:'번호 옆에 순서 텍스트 병기',  num:'tag',  bg:''},
    {label:'V6 · "1." 텍스트 번호(원 없이)',      note:'원 대신 초록 숫자',          num:'text', bg:''},
    {label:'V7 · 번호 원(green600, 밝은)',        note:'V1보다 밝은 초록 번호',       num:'c600', bg:''},
    {label:'V8 · 번호 좌측 인덱스(ex40)',         note:'번호 좌·입력 우',            num:'c700', bg:'', layout:'left'}
  ];

  function tin(label,ph,type,val){
    return '<div class="tfield"><label>'+label+'</label><div class="tin-wrap">'
      +'<input type="'+type+'" inputmode="'+(type==='tel'?'numeric':'text')+'" placeholder="'+esc(ph)+'" value="'+esc(val)+'" readonly>'
      +'<button class="clr" type="button" tabindex="-1">'+CLR+'</button></div></div>';
  }
  function fields(k){ return tin('아동 이름','이름','text',k.name)+tin('생년월일','생년월일','tel',k.birth); }
  function numEl(v,i){
    if(v.num==='text') return '<span class="kn-text">'+(i+1)+'.</span>';
    if(v.num==='c600') return '<span class="kn-c600">'+(i+1)+'</span>';
    if(v.num==='tag')  return '<span class="kn-tag"><span class="kn-c700">'+(i+1)+'</span><span class="kt">'+['첫째','둘째','셋째','넷째'][i]+' 아이</span></span>';
    return '<span class="kn-c700">'+(i+1)+'</span>';
  }
  function kidBlock(k,i,v){
    var del='<button class="kdel" aria-label="지우기">'+MINUS+'</button>';
    if(v.layout==='left'){
      return '<div class="kid"><div class="khead">'+numEl(v,i)+'</div><div class="ki-body">'+fields(k)+'</div>'+del+'</div>';
    }
    return '<div class="kid"><div class="khead">'+numEl(v,i)+del+'</div>'+fields(k)+'</div>';
  }
  function variantHtml(v){
    var kids=KIDS.map(function(k,i){return kidBlock(k,i,v);}).join('');
    var wrapCls='intro-card'+(v.bg?(' b-'+v.bg):'')+(v.layout==='left'?' lay-left':'');
    var inner='<div class="'+wrapCls+'"><span class="brand-chip">초기 모니터링</span>'
      +'<div class="head">3개월 동안<br>어떠셨어요? <span class="em">😊</span></div>'
      +'<p class="lead">더 좋은 수업을 위해, 잠깐 참여해주세요.</p>'+kids
      +'<button class="sib-link">＋ 함께 다니는 아이가 있어요</button></div>';
    return '<div class="variant"><div class="vlabel">'+v.label+'</div><div class="vnote">'+v.note+'</div>'+inner+'</div>';
  }
  var tabs=document.getElementById('tabs'), view=document.getElementById('view');
  tabs.innerHTML=VARIANTS.map(function(v,i){return '<button class="tab" data-i="'+i+'">V'+(i+1)+'</button>';}).join('');
  function show(i){
    view.innerHTML=variantHtml(VARIANTS[i]);
    Array.prototype.forEach.call(tabs.children,function(b,j){ b.classList.toggle('on', j===i); });
    window.scrollTo(0,0);
  }
  Array.prototype.forEach.call(tabs.children,function(b){ b.onclick=function(){ show(+b.dataset.i); }; });
  show(0);
</script>
</body>
</html>

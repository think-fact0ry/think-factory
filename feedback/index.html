<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>생각공작소 · 수업 피드백</title>
<meta name="robots" content="noindex">
<style>
  html,body{margin:0; padding:0; height:100%; background:#f7f5f1; overflow:hidden;}
  /* GAS 웹앱을 iframe으로 감싸 회색 배너 제거(gas-iframe-embed-removes-banner). */
  iframe{display:block; border:none; width:100%; height:100%;}
</style>
</head>
<body>
<iframe id="ff"
  src="https://script.google.com/macros/s/AKfycbxzbwBUa6BB8N5GozHgCWGcd-JJp_tKCW1U7LgRFD0ZqjFOFVKettyYPGOL5mEakvIW/exec"
  title="생각공작소 수업 피드백"
  allow="clipboard-write"></iframe>
<script>
  /* 임베드 뷰포트 브릿지(apply-form-embed-bridge):
     iframe 안의 position:fixed footbar는 iframe 바닥을 기준 삼는데, 그게 실제 화면 하단(키보드 위)이 아니라
     베이지 띠가 생김. 부모가 iframe 높이를 visualViewport.height(=키보드 위 영역)로 맞추면
     iframe 바닥 = 키보드 위가 되어 footbar가 키보드에 딱 붙는다. (키보드 닫히면 전체 높이로 복귀.) */
  (function(){
    var vv = window.visualViewport, ifr = document.getElementById('ff');
    function fit(){ ifr.style.height = (vv ? vv.height : window.innerHeight) + 'px'; }
    if(vv){ vv.addEventListener('resize', fit); vv.addEventListener('scroll', fit); }
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 80); });
    fit();
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<!-- 태블릿 가입화면과 동일: interactive-widget=resizes-content를 top-level(부모)에 둬 키보드가 레이아웃을 줄임
     → iframe(100%)이 따라 줄어 폼의 fixed footbar(참여하기)가 키보드 위에 붙음. 폼은 plain iframe 안에서 자기 키보드 처리. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>생각공작소 · 초기 모니터링</title>
<meta name="robots" content="noindex">
<style>
  html{height:100%;}
  body{margin:0; padding:0; height:100%; background:#f7f5f1; overflow:hidden;}
  iframe{display:block; border:none; width:100%; height:100%;}
</style>
</head>
<body>
<iframe id="ff"
  src="https://script.google.com/macros/s/AKfycbxzbwBUa6BB8N5GozHgCWGcd-JJp_tKCW1U7LgRFD0ZqjFOFVKettyYPGOL5mEakvIW/exec"
  title="생각공작소 초기 모니터링"
  allow="clipboard-write"></iframe>
<script>
  // 쿼리 파라미터를 폼(GAS)으로 전달 — ?cta=1(리뷰 게이팅 테스트)·?preview=review 등. 없으면 기본 exec(일반 부모 발송 링크). 유성 2026-07-07.
  if(location.search){ document.getElementById('ff').src='https://script.google.com/macros/s/AKfycbxzbwBUa6BB8N5GozHgCWGcd-JJp_tKCW1U7LgRFD0ZqjFOFVKettyYPGOL5mEakvIW/exec'+location.search; }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<!-- 핵심: interactive-widget=resizes-content를 top-level(이 부모)에 둔다.
     키보드가 뜨면 브라우저가 부모의 레이아웃 뷰포트(ICB)를 키보드 위로 줄이고,
     iframe(height:100%)이 순수 CSS 레이아웃으로 따라 줄어든다 → 폼의 fixed footbar가 키보드에 붙음.
     (visualViewport-JS·postMessage 불필요. cross-origin iframe에서도 레이아웃 캐스케이드라 동작.)
     폼(iframe) 쪽엔 이 속성을 두지 않는다(이중 축소 방지) — 폼은 iframe을 그대로 채우기만. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>생각공작소 · 수업 피드백</title>
<meta name="robots" content="noindex">
<style>
  html{height:100%; overscroll-behavior:none;}
  body{margin:0; padding:0; height:100%; background:#f7f5f1; overflow:hidden; overscroll-behavior:none;}
  /* GAS 웹앱을 iframe으로 감싸 회색 배너 제거(gas-iframe-embed-removes-banner). */
  iframe{display:block; border:none; width:100%; height:100%;}
</style>
</head>
<body>
<iframe
  src="https://script.google.com/macros/s/AKfycbxzbwBUa6BB8N5GozHgCWGcd-JJp_tKCW1U7LgRFD0ZqjFOFVKettyYPGOL5mEakvIW/exec"
  title="생각공작소 수업 피드백"
  allow="clipboard-write"></iframe>
</body>
</html>

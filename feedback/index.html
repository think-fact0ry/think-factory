<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>생각공작소 · 수업 피드백</title>
<meta name="robots" content="noindex">
<style>
  html,body{margin:0; padding:0; height:100%; background:#f7f5f1; overflow:hidden;}
  /* GAS 웹앱을 iframe으로 감싸 회색 배너 제거(gas-iframe-embed-removes-banner). */
  iframe{position:fixed; top:0; left:0; border:none; width:100%; height:100%;}
</style>
</head>
<body>
<iframe id="ff"
  src="https://script.google.com/macros/s/AKfycbxzbwBUa6BB8N5GozHgCWGcd-JJp_tKCW1U7LgRFD0ZqjFOFVKettyYPGOL5mEakvIW/exec"
  title="생각공작소 수업 피드백"
  allow="clipboard-write"></iframe>
<script>
  /* 임베드 뷰포트 브릿지(apply-form-embed-bridge):
     iframe을 visualViewport(=실제 보이는 영역: 키보드·URL바·하단바 제외)에 정확히 맞춘다.
     - 키보드 열림: iframe = 키보드 위 영역 → 폼의 fixed footbar(참여하기)가 키보드에 딱 붙음.
     - 키보드 닫힘: iframe = 보이는 영역 → 폼 하단 인플로우 버튼(제출하기)이 브라우저 바에 안 잘림.
     폼(iframe) 쪽엔 interactive-widget 없음(이중 축소 방지) — 폼은 iframe을 그대로 채우기만. */
  (function(){
    var vv = window.visualViewport, ifr = document.getElementById('ff');
    function fit(){
      var h = vv ? vv.height : window.innerHeight;
      var t = vv ? vv.offsetTop : 0;
      ifr.style.height = h + 'px';
      ifr.style.transform = t ? 'translateY(' + t + 'px)' : 'none';
    }
    if(vv){ vv.addEventListener('resize', fit); vv.addEventListener('scroll', fit); }
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 80); });
    fit();
  })();
</script>
</body>
</html>

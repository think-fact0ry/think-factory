    <!-- TODO: 상담 신청 폼(개인정보 수집) 가동 시점에 수집 항목·목적·보유 기간 확정 기재 -->

<!-- 모바일 드로어 메뉴 -->
<div class="drawer" id="drawer">
  <div class="dim" data-close></div>
  <div class="panel">
    <button class="dclose" data-close aria-label="메뉴 닫기">×</button>
    <a href="index.html">홈</a>
    <a href="story.html">이야기</a>
    <a href="services.html">바우처</a>
    <a href="activities.html">활동</a>
    <a class="dcta" href="contact.html">상담 신청</a>
  </div>
</div>

<script>
(function () {
  var d = document.getElementById('drawer'), b = document.getElementById('hbBtn');
  if (!d || !b) return;
  function reset() { d.classList.remove('open'); document.body.style.overflow = ''; }
  b.addEventListener('click', function () {
    d.classList.add('open'); document.body.style.overflow = 'hidden';
    history.pushState({ drawer: 1 }, '');
  });
  d.addEventListener('click', function (e) {
    if (e.target.closest('a')) { reset(); return; }
    if (e.target.hasAttribute('data-close')) { reset(); if (history.state && history.state.drawer) history.back(); }
  });
  window.addEventListener('popstate', function () { if (d.classList.contains('open')) reset(); });
  window.addEventListener('resize', function () { if (window.innerWidth > 760 && d.classList.contains('open')) reset(); });
})();
</script>

</body>

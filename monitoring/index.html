<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>모니터링 설문 — 생각공작소</title>
<meta name="robots" content="noindex">
<!-- ⚠️ 카톡 인앱 = 상하단 바가 설문을 가림(§3.7) → 기본 브라우저로 탈출(유성 2026-07-08). iframe 로드보다 먼저 head에서 실행.
     탈출되면 기본 브라우저에서 이 페이지가 다시 열려 아래 iframe이 정상 렌더. 기본 브라우저 UA엔 KAKAOTALK 없어 재탈출 루프 없음. -->
<script>
  if (/KAKAOTALK/i.test(navigator.userAgent)) {
    location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);
  }
</script>
<!-- 모니터링 설문. think-factory.kr/monitoring → 14_모니터링설문 GAS 웹앱을 *우리 도메인에서 iframe 임베드*.
     리다이렉트(=주소가 script.google.com으로 바뀌고 구글 배너 노출) 대신 임베드라 주소·배너 깨끗.
     14 doGet이 XFrameOptionsMode.ALLOWALL이라 프레임 허용됨(contact.html이 06을 같은 방식으로 임베드).
     이동 대상이 바뀌면 아래 EXEC 한 줄만 교체. (옛 /m 리다이렉트는 레거시 — 새 발송은 /monitoring 사용) -->
<style>
  html, body { height: 100%; margin: 0; background: #f7f5f1; }
  iframe { border: 0; width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<!-- web-share: iOS 리뷰 영수증 저장이 공유시트(navigator.share)를 씀 — 크로스오리진 iframe은 이 위임 없으면 NotAllowedError.
     GAS 자체 sandboxFrame은 web-share * 위임 확인됨(2026-07-11 curl 실측) → 우리 층만 열면 끝. -->
<iframe id="survey" title="모니터링 설문" allow="web-share; clipboard-write"></iframe>
<script>
  var EXEC = "https://script.google.com/macros/s/AKfycbx6zIcFuPUPRBr4VmW6kT98HzQv0UgtEUBwVLu8V4P9xCphV9ZP9yG_ZKsRfglLA4Kx/exec";
  // 쿼리스트링 붙어 오면 그대로 전달(향후 확장 대비)
  document.getElementById('survey').src = EXEC + (location.search || "");
</script>
</body>
</html>
